services:
  db:
    image: postgres:16-alpine
    container_name: eams-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eams
    ports:
      - '5432:5432'
    volumes:
      - eams_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eams-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://postgres:postgres@db:5432/eams?schema=public
      JWT_SECRET: change-me-in-production-please-use-a-long-secret
      CLIENT_URL: http://localhost:8080
    ports:
      - '4002:4002'

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4002/api/v1
        VITE_USE_MOCK: 'false'
    container_name: eams-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  eams_pgdata:
